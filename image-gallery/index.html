<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Gallery</title>
    <link href="style.css" rel="stylesheet" />
  </head>
  <body>
    <header class="page-header">
      <div class="container">
        <h1 class="page-title">Image Gallery</h1>
        <input
          class="search-input"
          type="search"
          name="search"
          id="search"
          placeholder="Search..."
          autocomplete="off"
        />
        <button class="search-btn" type="button"></button>
      </div>
    </header>
    <main class="page-content">
      <div class="container">
        <section class="gallery">
          <h2 class="section-title visibility-hidden">Images</h2>
        </section>
      </div>
    </main>
    <footer class="page-footer">
      <div class="container footer-container">
        <p class="year">2023</p>
        <p class="school">
          <a href="https://rs.school/js-stage0/ " target="_blank"
            ><img
              src="rs_school_js.svg"
              width="125"
              height="46"
              alt="RS-School's logotype"
          /></a>
        </p>
        <p class="github">
          <a href="https://github.com/AlexKuryanov" target="_blank"
            >AlexKuryanov</a
          >
        </p>
      </div>
    </footer>
    <script src="main.js"></script>
  </body>
</html>
